config:
  feishu:
    assistant:
      app_id: "cli_xxx"
      app_secret: "..."
      encrypt_key: "..."
      verification_token: "..."
      bot_open_id: "ou_xxx"
      bot_name: "飞书 Codex 助手"
      domain: "feishu"
      reply_mode: "codex"
      reply_prefix: "AI 助手："
      ignore_self_messages: true
      auto_reply: true
      require_mention: true
      require_mention_group_only: true
      progress:
        enabled: true
        message: "已接收，正在执行。"
        mode: "doc"
        doc:
          title_prefix: "Codex 任务进度"
          share_to_chat: true
          link_scope: "same_tenant"
          include_user_message: true
          write_final_reply: true
      codex:
        bin: "codex"
        api_key: "sk-..."
        model: "gpt-5.4"
        reasoning_effort: "xhigh"
        profile: ""
        cwd: "/absolute/path/to/your/workspace"
        add_dirs:
          - "/absolute/path/to/another/workspace"
        model_routes:
          writing_request:
            enabled: false
            model: "gpt-5.4"
            reasoning_effort: "xhigh"
            trigger_keywords:
              - "写公众号文章"
              - "公众号文章"
              - "写长文"
              - "长文 Markdown"
              - "Markdown 正文"
              - "生成正文"
              - "写成稿"
              - "尝鲜派风格"
          non_coding_request:
            enabled: false
            model: "gpt-5.4"
            reasoning_effort: "xhigh"
            trigger_keywords:
              - "不用Codex"
              - "不要Codex"
              - "使用其他模型"
              - "非编程模型"
        history_turns: 6
        system_prompt: "你是“飞书 Codex 助手”，通过飞书和用户交流。请直接回答用户问题，不要复述用户原话。"
      speech:
        enabled: true
        api_key: "sk-..."
        model: "gpt-4o-mini-transcribe"
        language: ""
        base_url: "https://api.openai.com/v1"
        ffmpeg_bin: ""
      memory:
        enabled: true
        role_memory: |
          默认用简体中文回复。
          默认先做事，再解释。
      daily_report:
        enabled: false
        chat_id: "oc_xxx"
        schedule: "08:00"
        timezone: "Asia/Shanghai"
        store:
          base_url: "https://store-admin.example.com"
          email: "store-admin@example.com"
          password: "..."
      outbound_channels:
        wecom:
          corp_id: "ww_xxx"
          agent_id: "1000002"
          secret: "..."
          base_url: "https://qyapi.weixin.qq.com"
        named_targets:
          feishu:
            财务群:
              target_type: "chat"
              target_id: "oc_xxx"
              label: "飞书财务群"
          wecom:
            客服群:
              target_type: "chat"
              target_id: "chatid_xxx"
              label: "企业微信客服群"
